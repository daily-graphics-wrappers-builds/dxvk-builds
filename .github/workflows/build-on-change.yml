name: "Auto build DXVK on change"

on:
  workflow_dispatch:          # manual trigger
  schedule:
    - cron: '0 * * * *'       # every hour – change to '*/5 * * * *' if you really need 5 min

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repo (to store the last built commit hash)
      - name: Checkout your repo
        uses: actions/checkout@v4

      # 2. Get latest DXVK commit SHA
      - name: Get latest DXVK commit
        id: get-latest
        run: |
          LATEST_SHA=$(git ls-remote https://github.com/doitsujin/dxvk HEAD | cut -f1)
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "Latest DXVK commit: $LATEST_SHA"

      # 3. Read last built commit
      - name: Read last built commit
        id: last-built
        run: |
          if [ -f last_built_commit.txt ]; then
            LAST_SHA=$(cat last_built_commit.txt)
          else
            LAST_SHA=""
          fi
          echo "last_sha=$LAST_SHA" >> $GITHUB_OUTPUT

      # 4. Decide whether to build
      - name: Check if new commit
        id: should-build
        run: |
          if [ "${{ steps.get-latest.outputs.latest_sha }}" != "${{ steps.last-built.outputs.last_sha }}" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      # 5. Build DXVK (only if changed)
      - name: Build DXVK
        if: steps.should-build.outputs.build == 'true'
        id: build
        uses: Joshua-Ashton/arch-mingw-github-action@v8
        with:
          command: |
            # Clone DXVK source at the specific commit
            git clone --depth 1 --recursive https://github.com/doitsujin/dxvk.git dxvk_source
            cd dxvk_source
            git fetch --depth 1 origin ${{ steps.get-latest.outputs.latest_sha }}
            git checkout ${{ steps.get-latest.outputs.latest_sha }}
            SHORT_SHA=$(git rev-parse --short HEAD)
            # Package without --no-package – this creates .tar.gz
            ./package-release.sh "$SHORT_SHA" build
            echo "short_sha=$SHORT_SHA" >> $GITHUB_ENV
            echo "The .tar.gz file is at: build/dxvk-$SHORT_SHA.tar.gz"

      # 6. Collect ALL generated files (both .tar.gz and optionally convert to .zip)
      - name: Collect artifacts
        if: steps.should-build.outputs.build == 'true'
        run: |
          mkdir -p release_assets
          # Copy the original DXVK .tar.gz
          cp dxvk_source/build/dxvk-*.tar.gz release_assets/
          # Also create a .zip from the unpacked contents (so users have a choice)
          cd dxvk_source/build
          tar -xzf dxvk-*.tar.gz
          # The extracted folder is named like dxvk-<sha>/
          ZIP_FOLDER=$(ls -d dxvk-*/ | head -1)
          zip -r "../../release_assets/dxvk-${{ env.short_sha }}.zip" "$ZIP_FOLDER"
          cd ../..
          # List what we have
          ls -la release_assets/

      # 7. Create GitHub Release with both .tar.gz and .zip
      - name: Create Release
        if: steps.should-build.outputs.build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "DXVK (${{ env.short_sha }})"
          tag_name: "dxvk-${{ env.short_sha }}"
          files: release_assets/*
          generate_release_notes: true

      # 8. Remember this commit for next run
      - name: Update last built commit
        if: steps.should-build.outputs.build == 'true'
        run: |
          echo "${{ steps.get-latest.outputs.latest_sha }}" > last_built_commit.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_built_commit.txt
          git commit -m "Update last built commit to ${{ steps.get-latest.outputs.latest_sha }}"
          git push
