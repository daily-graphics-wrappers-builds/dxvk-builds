name: "Auto build DXVK on change"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'       # every hour

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Get latest DXVK commit
        id: get-latest
        run: |
          LATEST_SHA=$(git ls-remote https://github.com/doitsujin/dxvk HEAD | cut -f1)
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "Latest DXVK commit: $LATEST_SHA"

      - name: Read last built commit
        id: last-built
        run: |
          if [ -f last_built_commit.txt ]; then
            LAST_SHA=$(cat last_built_commit.txt)
          else
            LAST_SHA=""
          fi
          echo "last_sha=$LAST_SHA" >> $GITHUB_OUTPUT

      - name: Check if new commit
        id: should-build
        run: |
          if [ "${{ steps.get-latest.outputs.latest_sha }}" != "${{ steps.last-built.outputs.last_sha }}" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build DXVK
        if: steps.should-build.outputs.build == 'true'
        id: build
        uses: Joshua-Ashton/arch-mingw-github-action@v8
        with:
          command: |
            git clone --depth 1 --recursive https://github.com/doitsujin/dxvk.git dxvk_source
            cd dxvk_source
            git fetch --depth 1 origin ${{ steps.get-latest.outputs.latest_sha }}
            git checkout ${{ steps.get-latest.outputs.latest_sha }}
            SHORT_SHA=$(git rev-parse --short HEAD)
            ./package-release.sh "$SHORT_SHA" build
            echo "short_sha=$SHORT_SHA" >> $GITHUB_ENV

      - name: Collect artifacts
        if: steps.should-build.outputs.build == 'true'
        run: |
          mkdir -p release_assets
          # Copy the original .tar.gz
          cp dxvk_source/build/dxvk-*.tar.gz release_assets/

          # Extract the tarball into a temporary directory (solves permission issues)
          mkdir -p temp_extract
          tar -xzf dxvk_source/build/dxvk-*.tar.gz -C temp_extract

          # Find the extracted folder (should be named dxvk-<short_sha>)
          EXTRACTED_DIR=$(ls -d temp_extract/dxvk-*/ | head -1)
          EXTRACTED_DIR_NAME=$(basename "$EXTRACTED_DIR")

          # Zip the extracted folder
          cd temp_extract
          zip -r "../release_assets/dxvk-${{ env.short_sha }}.zip" "$EXTRACTED_DIR_NAME"
          cd ..

          ls -la release_assets/

      - name: Create Release
        if: steps.should-build.outputs.build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "DXVK (${{ env.short_sha }})"
          tag_name: "dxvk-${{ env.short_sha }}"
          files: release_assets/*
          generate_release_notes: true

      - name: Update last built commit
        if: steps.should-build.outputs.build == 'true'
        run: |
          echo "${{ steps.get-latest.outputs.latest_sha }}" > last_built_commit.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_built_commit.txt
          git commit -m "Update last built commit to ${{ steps.get-latest.outputs.latest_sha }}"
          git push
